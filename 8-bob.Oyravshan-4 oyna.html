<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3-Bob</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #050505, #121212, #1d1d1d);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ===== Raqam tanlash ekrani ===== */
        #select-screen {
            width: 100%; max-width: 700px;
            display: flex; flex-direction: column; align-items: center;
            gap: 25px; padding: 20px 0;
        }
        #select-screen h1 {
            font-size: 26px; color: #00ff99; text-align: center;
        }
        #select-screen p { color: #999; font-size: 14px; text-align: center; }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 10px;
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
            background: #111;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,255,150,0.15);
        }
        .number-grid::-webkit-scrollbar { width: 8px; }
        .number-grid::-webkit-scrollbar-thumb { background: #00ff99; border-radius: 10px; }
        .num-btn {
            background: #1b1b1b;
            border: 2px solid #00ff99;
            color: #00ff99;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
            text-shadow: 0 0 8px rgba(0,255,153,0.6);
        }
        .num-btn:hover {
            background: #00ff99;
            color: #050505;
            box-shadow: 0 0 20px rgba(0,255,150,0.8);
            transform: scale(1.08);
        }
        .num-btn.picked {
            background: #ff9900;
            border-color: #ff9900;
            color: #050505;
            box-shadow: 0 0 20px rgba(255,153,0,0.8);
        }
        #range-info {
            color: #ff9900; font-size: 15px; font-weight: bold; min-height: 22px;
        }

        /* ===== Funksiya tanlash ekrani ===== */
        #mode-screen {
            display: none;
            width: 100%; max-width: 700px;
            flex-direction: column; align-items: center;
            gap: 25px; padding: 20px 0;
        }

        .mode-icon-top {
            width: 100%;
            max-width: 450px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mode-icon-top img {
            width: 100%;
            height: auto;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 10px;
        }

        #mode-screen h1 {
            font-size: 24px; color: #00ff99; text-align: center;
            margin: 5px 0;
        }

        .mode-wrapper {
            width: 100%;
            background: rgba(5, 5, 5, 0.4);
            border-radius: 20px;
            padding: 25px;
        }
        .mode-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .mode-card {
            background: rgba(27, 27, 27, 0.85);
            border-radius: 20px;
            padding: 30px 15px;
            text-align: center;
            transition: 0.4s;
            color: white;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(3px);
        }
        .mode-card::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: linear-gradient(45deg,transparent,#00ff99,transparent);
            top: -150%; left: -150%; transform: rotate(25deg); transition: 0.7s;
        }
        .mode-card:hover::before { top: 100%; left: 100%; }
        .mode-card:hover { transform: translateY(-5px) scale(1.02); border-color: #00ff99; box-shadow: 0 0 15px rgba(0,255,153,0.2); }
        @media(max-width:600px){ .mode-grid{ grid-template-columns: 1fr; } }

        /* ===== Intro (countdown) ekran ===== */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            height: 100dvh;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5;
            transition: opacity 0.8s ease;
        }
        #stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        #select-screen, #mode-screen, .quiz-box, #intro-screen .content-box, #intro-screen #countdown {
            position: relative; z-index: 2;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2.5s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.6); }
        }
        .content-box { text-align: center; margin-bottom: 50px; z-index: 1; position: relative; padding: 0 20px; }
        #countdown {
            position: absolute; bottom: 50px;
            font-size: 80px; color: #00ff99; font-weight: bold;
            animation: pulse 1s infinite;
            z-index: 1;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        .quran-box {
            display: block;
            margin: 25px auto 0 auto;
            padding: 20px 30px;
            max-width: 550px;
            border: 4px double #ffd700;
            background: rgba(20, 16, 5, 0.6);
            text-align: center;
        }
        .quran-ayat-text {
            font-size: 18px;
            line-height: 1.6;
            color: #f0f0f0;
            margin-bottom: 15px;
            display: block;
        }
        .quran-meta {
            display: inline-block;
            font-size: 15px;
            font-weight: bold;
            color: #ffd700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            padding-top: 8px;
            width: 100%;
        }

        /* ===== Quiz ekrani ===== */
        .quiz-box {
            display: none;
            width: 100%; max-width: 600px; background: #1b1b1b; padding: 30px;
            border-radius: 25px; box-shadow: 0 0 35px rgba(0, 255, 150, 0.1);
            text-align: center; margin-top: 50px;
        }
        h2 { color: #00ff99; margin-bottom: 20px; font-size: 22px; }
        .option {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: #2a2a2a; border: 2px solid #333; border-radius: 15px;
            cursor: pointer; transition: 0.3s; text-align: left;
        }
        .option:hover { border-color: #00ff99; }
        .correct {
            background: #00ff99 !important; color: black; font-weight: bold;
            animation: bubbleEffect 0.5s ease-out;
        }
        @keyframes bubbleEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .wrong { background: #ff4d4d !important; color: white; }
        .btn-finish {
            width: 100%; padding: 15px; background: transparent; border: 2px solid #00ff99;
            color: #00ff99; border-radius: 15px; cursor: pointer; margin-top: 20px;
            font-weight: bold; transition: 0.3s;
        }
        .btn-finish:hover { background: #00ff99; color: black; }

        .closed-input {
            width: 100%; padding: 15px; margin-top: 10px; border: 2px solid #333;
            border-radius: 12px; font-size: 17px; outline: none; background: #2a2a2a;
            color: white;
        }
        .closed-input:focus { border-color: #00ff99; }
        .btn-check {
            width: 100%; padding: 15px; margin-top: 15px; border: 2px solid #00ff99; border-radius: 15px;
            background: transparent; color: #00ff99; font-weight: bold; cursor: pointer; font-size: 17px;
            transition: 0.3s;
        }
        .btn-check:hover { background: #00ff99; color: black; }
        #closed-result { margin-top: 15px; font-size: 18px; min-height: 30px; text-align: center; }

        /* ===== Mobil to'liq ekran tuzatishlari ===== */
        @media (max-width: 480px) {
            body { padding: 12px; }
            #select-screen h1 { font-size: 21px; }
            #mode-screen h1 { font-size: 19px; }
            .mode-card { padding: 22px 10px; font-size: 14px; }
            .quiz-box { padding: 20px 16px; margin-top: 30px; }
            h2 { font-size: 18px; }
            .content-box h1 { font-size: 24px !important; }
            .quran-ayat-text { font-size: 15px; }
            #countdown { font-size: 60px; bottom: 35px; }
            .number-grid { grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); }
        }
    </style>
</head>

const ayats = [
    { text: "Robbing seni tark qilmadi va g'azab ham qilmadi.", meta: "Zuho 93:3" },
    { text: "Albatta bir qiyinchilik bilan osonchilik bordir.", meta: "Sharh 94:5" },
    { text: "Yaratgan Robbing nomi bilan o'qi!", meta: "Alaq 96:1" },
    { text: "O'qi, Robbing karamlilar karamlisidir.", meta: "Alaq 96:3" },
    { text: "Va tezda Robbing senga ato qilur va sen rozi bo'lursan.", meta: "Zuho 93:5" },
    { text: "Ammo kimki ato bersa va taqvo qilsa, va yaxshiliklarni tasdiq qilsa, bas, Biz uni osonga muyassar etamiz.", meta: "Layl 92:5-7" },
    { text: "Albatta hidoyatga boshlash Bizning zimmamizdadir.", meta: "Layl 92:12" },
    { text: "Va albatta tezda rozi bo'ladir.", meta: "Layl 92:21" },
    { text: "Seni oson yo'lga muyassar etamiz.", meta: "A'lo 87:8" },
    { text: "Bas, kim xohlasa Parvardigori tomon qaytadigan yo'lni tutar.", meta: "Naba 78:39" },
    { text: "Albatta Biz senga ochiq g'alaba berdik.", meta: "Fath 48:1" }
];

let activeQuiz = [];
let currentQ = 0, score = 0, answered = 0;

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function buildStars() {
    const container = document.getElementById('stars');
    container.innerHTML = '';
    const count = 100;
    for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        const size = (Math.random() * 2 + 1).toFixed(1);
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.animationDelay = (Math.random() * 2.5).toFixed(2) + 's';
        s.style.animationDuration = (1.5 + Math.random() * 2).toFixed(2) + 's';
        container.appendChild(s);
    }
}

let rangeStart = null;
let numButtons = [];

window.onload = function() {
    const grid = document.getElementById('numberGrid');
    for (let i = 1; i <= quizData.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.innerText = i;
        btn.onclick = () => pickNumber(i, btn);
        grid.appendChild(btn);
        numButtons.push(btn);
    }
    buildStars();

    const randomIdx = Math.floor(Math.random() * ayats.length);
    const selectedAyat = ayats[randomIdx];
    document.getElementById('random-ayat').innerHTML = `
        <div class="quran-box">
            <span class="quran-ayat-text">"${selectedAyat.text}"</span>
            <span class="quran-meta">${selectedAyat.meta}</span>
        </div>
    `;
};

function pickNumber(num, btnEl) {
    const info = document.getElementById('range-info');

    if (rangeStart === null) {
        rangeStart = num;
        btnEl.classList.add('picked');
        info.innerText = `Boshlang'ich: ${num}. Endi oxirgi raqamni tanlang`;
    } else {
        let start = rangeStart;
        let end = num;
        if (end < start) { const t = start; start = end; end = t; }
        btnEl.classList.add('picked');
        info.innerText = `Tanlandi: ${start} - ${end}`;
        setTimeout(() => startWithRange(start, end), 400);
    }
}

function startWithRange(start, end) {
    activeQuiz = quizData.slice(start - 1, end);
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('mode-screen').style.display = 'flex';
}

let quizMode = 'quiz';

function chooseMode(mode) {
    quizMode = mode;
    if (mode === 'quiz-aralash' || mode === 'yopiq-aralash') {
        activeQuiz = shuffle([...activeQuiz]);
    }
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('intro-screen').style.display = 'flex';
    document.getElementById('intro-screen').style.opacity = '1';
    startTimer();
}

function startTimer() {
    let count = 3;
    let disp = document.getElementById("countdown");
    disp.innerText = count;
    let timer = setInterval(() => {
        count--;
        if (count > 0) {
            disp.innerText = count;
        } else if (count === 0) {
            disp.innerText = "Boshladik!";
        } else {
            clearInterval(timer);
            document.getElementById("intro-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("intro-screen").style.display = "none";
                document.getElementById("quiz").style.display = "block";
                loadQ();
            }, 800);
        }
    }, 1000);
}

function getOptionsFor(qData) {
    return shuffle([qData.correct, ...qData.wrongs]);
}

function loadQ() {
    const qData = activeQuiz[currentQ];
    document.getElementById('question').innerText = `${currentQ + 1}/${activeQuiz.length}. ${qData.q}`;
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';

    if (quizMode === 'yopiq' || quizMode === 'yopiq-aralash') {
        loadClosedQ(qData, optDiv);
    } else {
        loadMultipleChoiceQ(qData, optDiv);
    }
}

function loadMultipleChoiceQ(qData, optDiv) {
    let shuffledOptions = getOptionsFor(qData);

    shuffledOptions.forEach((opt) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => check(opt, btn, qData.correct);
        optDiv.appendChild(btn);
    });
}

function loadClosedQ(qData, optDiv) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'closed-input';
    input.id = 'closed-answer';
    input.placeholder = 'Javob yozing...';
    input.onkeypress = (e) => { if (e.key === 'Enter') checkClosed(qData); };

    const checkBtn = document.createElement('button');
    checkBtn.className = 'btn-check';
    checkBtn.innerText = 'Tekshirish';
    checkBtn.onclick = () => checkClosed(qData);

    const resultDiv = document.createElement('div');
    resultDiv.id = 'closed-result';

    optDiv.appendChild(input);
    optDiv.appendChild(checkBtn);
    optDiv.appendChild(resultDiv);

    input.focus();
}

function checkClosed(qData) {
    const inputEl = document.getElementById('closed-answer');
    const resultDiv = document.getElementById('closed-result');
    const user = inputEl.value.toLowerCase().trim();
    const correct = qData.correct.toLowerCase().trim();

    answered++;
    inputEl.disabled = true;
    document.querySelector('.btn-check').disabled = true;

    if (user === correct) {
        resultDiv.innerHTML = '<b style="color:#00ff99;">✅ To\'g\'ri</b>';
        score++;
    } else {
        resultDiv.innerHTML = '<b style="color:#ff4444;">❌ Noto\'g\'ri.</b><br> Javob: ' + qData.correct;
    }

    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 2000);
}

function check(selected, element, correct) {
    const options = element.parentElement.querySelectorAll('.option');
    options.forEach(opt => opt.style.pointerEvents = 'none');
    answered++;

    if (selected === correct) {
        element.classList.add('correct');
        score++;
    } else {
        element.classList.add('wrong');
        options.forEach(opt => {
            if (opt.innerText === correct) opt.classList.add('correct');
        });
    }
    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 1000);
}

function finishQuiz() {
    let wrong = answered - score;
    document.getElementById('quiz').innerHTML = `
        <h2>Natijalar</h2>
        <div style="line-height: 2.2; font-size: 19px;">
            Jami savollar: <b>${activeQuiz.length} ta</b><br>
            To'g'ri javoblar: <span style="color:#00ff99;">${score} ta</span><br>
            Xato javoblar: <span style="color:#ff4d4d;">${wrong} ta</span>
        </div>
        <button class="btn-finish" onclick="location.reload()">Qaytadan boshlash</button>
    `;
}

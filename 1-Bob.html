<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>1-Bob.Buzuq til havosi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #050505, #121212, #1d1d1d);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ===== Raqam tanlash ekrani ===== */
        #select-screen {
            width: 100%; max-width: 700px;
            display: flex; flex-direction: column; align-items: center;
            gap: 25px; padding: 20px 0;
        }
        #select-screen h1 {
            font-size: 26px; color: #00ff99; text-align: center;
        }
        #select-screen p { color: #999; font-size: 14px; text-align: center; }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 10px;
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
            background: #111;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,255,150,0.15);
        }
        .number-grid::-webkit-scrollbar { width: 8px; }
        .number-grid::-webkit-scrollbar-thumb { background: #00ff99; border-radius: 10px; }
        .num-btn {
            background: #1b1b1b;
            border: 2px solid #00ff99;
            color: #00ff99;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
            text-shadow: 0 0 8px rgba(0,255,153,0.6);
        }
        .num-btn:hover {
            background: #00ff99;
            color: #050505;
            box-shadow: 0 0 20px rgba(0,255,150,0.8);
            transform: scale(1.08);
        }
        .num-btn.picked {
            background: #ff9900;
            border-color: #ff9900;
            color: #050505;
            box-shadow: 0 0 20px rgba(255,153,0,0.8);
        }
        #range-info {
            color: #ff9900; font-size: 15px; font-weight: bold; min-height: 22px;
        }

        /* ===== Funksiya tanlash ekrani ===== */
        #mode-screen {
            display: none;
            width: 100%; max-width: 700px;
            flex-direction: column; align-items: center;
            gap: 25px; padding: 20px 0;
        }

        {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 4 / 3;
            position: relative;
            background: rgba(5, 5, 5, 0.4);
          
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
         {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        #mode-screen h1 {
            font-size: 24px; color: #00ff99; text-align: center;
            margin: 5px 0;
        }

        .mode-wrapper {
            width: 100%;
            background: rgba(5, 5, 5, 0.4);
            border-radius: 20px;
            padding: 25px;
       
        }
        .mode-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .mode-card {
            background: rgba(27, 27, 27, 0.85);
            border-radius: 20px;
            padding: 30px 15px;
            text-align: center;
            transition: 0.4s;
            color: white;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(3px);
        }
        .mode-card::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: linear-gradient(45deg,transparent,#00ff99,transparent);
            top: -150%; left: -150%; transform: rotate(25deg); transition: 0.7s;
        }
        .mode-card:hover::before { top: 100%; left: 100%; }
        .mode-card:hover { transform: translateY(-5px) scale(1.02); border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
@media(max-width:600px){ 
    .mode-grid{ grid-template-columns: repeat(2, 1fr); } 
    .mode-icon-top{ display: flex; justify-content: center; }
    .mode-icon-top img{ width: 85%; max-width: 220px; }
}

        /* ===== Intro (countdown) ekran ===== */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            height: 100dvh;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5;
            transition: opacity 0.8s ease;
        }
        #stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        #select-screen, #mode-screen, .quiz-box, #intro-screen .content-box, #intro-screen #countdown {
            position: relative; z-index: 2;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2.5s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.6); }
        }
        .content-box { text-align: center; margin-bottom: 50px; z-index: 1; position: relative; padding: 0 20px; }
        #countdown {
            position: absolute; bottom: 50px;
            font-size: 80px; color: #00ff99; font-weight: bold;
            animation: pulse 1s infinite;
            z-index: 1;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        .quran-box {
            display: block;
            margin: 25px auto 0 auto;
            padding: 20px 30px;
            max-width: 550px;
            border: 4px double #ffd700;
            background: rgba(20, 16, 5, 0.6);
            text-align: center;
        }
        .quran-ayat-text {
            font-size: 18px;
            line-height: 1.6;
            color: #f0f0f0;
            margin-bottom: 15px;
            display: block;
        }
        .quran-meta {
            display: inline-block;
            font-size: 15px;
            font-weight: bold;
            color: #ffd700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            padding-top: 8px;
            width: 100%;
        }

        /* ===== Quiz ekrani ===== */
        .quiz-box {
            display: none;
            width: 100%; max-width: 600px; background: #1b1b1b; padding: 30px;
            border-radius: 25px; box-shadow: 0 0 35px rgba(0, 255, 150, 0.1);
            text-align: center; margin-top: 50px;
        }
        h2 { color: #00ff99; margin-bottom: 20px; font-size: 22px; }
        .option {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: #2a2a2a; border: 2px solid #333; border-radius: 15px;
            cursor: pointer; transition: 0.3s; text-align: left;
        }
        .option:hover { border-color: #00ff99; }
        .correct {
            background: #00ff99 !important; color: black; font-weight: bold;
            animation: bubbleEffect 0.5s ease-out;
        }
        @keyframes bubbleEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .wrong { background: #ff4d4d !important; color: white; }
        .btn-finish {
            width: 100%; padding: 15px; background: transparent; border: 2px solid #00ff99;
            color: #00ff99; border-radius: 15px; cursor: pointer; margin-top: 20px;
            font-weight: bold; transition: 0.3s;
        }
        .btn-finish:hover { background: #00ff99; color: black; }

        .closed-input {
            width: 100%; padding: 15px; margin-top: 10px; border: 2px solid #333;
            border-radius: 12px; font-size: 17px; outline: none; background: #2a2a2a;
            color: white;
        }
        .closed-input:focus { border-color: #00ff99; }
        .btn-check {
            width: 100%; padding: 15px; margin-top: 15px; border: 2px solid #00ff99; border-radius: 15px;
            background: transparent; color: #00ff99; font-weight: bold; cursor: pointer; font-size: 17px;
            transition: 0.3s;
        }
        .btn-check:hover { background: #00ff99; color: black; }
        #closed-result { margin-top: 15px; font-size: 18px; min-height: 30px; text-align: center; }

        /* ===== Mobil to'liq ekran tuzatishlari ===== */
        @media (max-width: 480px) {
            body { padding: 12px; }
            #select-screen h1 { font-size: 21px; }
            #mode-screen h1 { font-size: 19px; }
            .mode-card { padding: 22px 10px; font-size: 14px; }
            .quiz-box { padding: 20px 16px; margin-top: 30px; }
            h2 { font-size: 18px; }
            .content-box h1 { font-size: 24px !important; }
            .quran-ayat-text { font-size: 15px; }
            #countdown { font-size: 60px; bottom: 35px; }
            .number-grid { grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="stars"></div>

<div id="select-screen">
    <h1>🌙 2-Bob.Iskandar-1</h1>
    <p>Savollar sonini belgilang</p>
    <div id="range-info">Boshlang'ich raqamni tanlang</div>
    <div class="number-grid" id="numberGrid"></div>
</div>

<div id="mode-screen">
    <div class="mode-icon-top">
        <img src="sayr.jpg" alt="rasm">
    </div>
    <h1>Qaysi funksiyani xohlaysiz?</h1>
    <div class="mode-wrapper">
        <div class="mode-grid">
            <div class="mode-card" onclick="chooseMode('quiz')">Quiz testlar</div>
            <div class="mode-card" onclick="chooseMode('quiz-aralash')">Quiz aralash</div>
            <div class="mode-card" onclick="chooseMode('yopiq')">Yopiq savol-javob</div>
            <div class="mode-card" onclick="chooseMode('yopiq-aralash')">Yopiq savol-javob aralash</div>
        </div>
    </div>
</div>

<div id="intro-screen">
    <div class="content-box">
        <h1 style="color:#00ff99; font-size: 32px;">🌙 1-Bob.Buzuq til havosi</h1>
        <div id="random-ayat"></div>
    </div>
    <div id="countdown">3</div>
</div>

<div class="quiz-box" id="quiz">
    <h2 id="question">Yuklanmoqda...</h2>
    <div id="options"></div>
    <button class="btn-finish" onclick="finishQuiz()">Testni yakunlash</button>
</div>

<script>
const quizData = [
    { q: "Toshkentga kelganining nechanchi kuni peshinda unga Xoji bobo telefon qilgan edi?", correct: "3-kuni", wrongs: ["2-kuni", "5-kuni", "7-kuni"] },
    { q: "Bu kishi hech odamga o'xshab gapirolmaydi, bir og'izgina gapni ham albatta ohangjamaga solib, qo'yib bersangiz uch tilda birdek, Xayyomdan ruboiylar qo'shib aytsa, kim?", correct: "Xoji bobo", wrongs: ["Gena amaki", "Abdushukur aka", "G'ayrat aka"] },
    { q: "Iskandarning nega qaynota va qaynonasini ko'rishga ko'zi yo'q?", correct: "O'zaro allaqanday yasama \"adasi, oyisi\" deb muomala qilishlari", wrongs: ["Mol-dunyoga ortiqcha hirs qo'yishlari", "Uni doim past ko'rib gapirishlari", "Farzandlarini haddan tashqari erkalatishlari"] },
    { q: "Xoji bobo va xotini Toshkentda qancha vaqt yashab ketishgan edi?", correct: "1 yildan ko'roq", wrongs: ["6 oydan ko'proq", "2 yildan ko'proq", "3 yildan ko'proq"] },
    { q: "Xoji bobolar Toshkentning qayerida yashab ketishgan edi?", correct: "Zarangning xuv bir gadoy topmas tog' qishlog'idan, lekin indamasangiz Londonu Parijdan lof urishadi", wrongs: ["Tumanning eng chekka gadoy ko'p qishlog'idan, lekin so'zlasa Moskva-Peterburgdan gapiradi", "Viloyatning eng qashshoq mahallasidan, lekin so'rasangiz Dubaydan kelgandek gapiradi", "Tog'ning etagidagi kambag'al qishlog'idan, lekin gapirsa Nyu-Yorkdan lof uradi"] },
    { q: "Xoji bobo va xotini Toshkentga uzoq yillar nima bahona borishgan edi?", correct: "Bebiliska bir sayyohlik yurishi sababdan", wrongs: ["Bolalarini ko'rgani borish bahonasida", "Davolanish uchun sayohat qilish niyatida", "Nabiralarini yo'qlab kelish bahonasida"] },
    { q: "\"Balchiqdan chiqqan beklar\" iborasi kimlarga nisbatan aytilgan?", correct: "Yangi boylarga / Xoji boboga", wrongs: ["Eski amaldorlarga", "Qishloq oqsoqollariga", "Shahar amaldorlariga"] },
    { q: "Indamas, odamovi, qornini g'amlab, sigaretini tutatib tursa bas, kim?", correct: "Jo'rabek", wrongs: ["G'ayrat", "Iskandar", "Shokir"] },
    { q: "Iskandar muovinlikka o'tib, mashina minadigan bo'lganida Xoji bobo unga kimni tavsiya qilgan edi?", correct: "Chala o'ris jiyanini", wrongs: ["Uzoq qarindoshi bolasini", "Qo'shni yigitchani", "O'ris kelinning ukasini"] },
    { q: "Xoji bobo Xo'ja Xofizni ko'makka chorlab, 1 odamni 1000 ta kaliti bor deb nimani nazarda tutgan?", correct: "Odamlarning qalbini / poraxo'rlikni", wrongs: ["Odamlarning ishonchini", "Amaldorlarning zaif tomonini", "Xalqning e'tiqodini"] },
    { q: "Kimni ko'rib \"bu kesakdan o't chiqqan\" degan Jo'ra?", correct: "Oyravshanni", wrongs: ["Dilyani", "Diloraning", "Shurikni"] },
    { q: "Jo'ra chala musulmonligiga borib, betamizlarcha Oyravshanni ko'rgach nima degan edi?", correct: "\"Besh ketgan, vasha plemyannitsa nastoyashshaya krasavitsa, shef, takix malo!\"", wrongs: ["\"Ana xolos, bunaqasi kam-da, chindan ham chiroyli qiz ekan!\"", "\"Voy, qanaqa go'zal, bunaqa xushro'y qizlar kam-da!\"", "\"E, buni qara-yu, haqiqiy malika-ku, ajoyib!\""] },
    { q: "Necha yildirki katta do'xtirlikni yig'ishtirib boyvuchcha sifat bo'lib uyda o'tirgan kim?", correct: "Dilrabo", wrongs: ["Adolat poshsha", "Marusa", "Dilora"] },
    { q: "Iskandarning nechta farzandi bor edi?", correct: "2 ta", wrongs: ["1 ta", "3 ta", "4 ta"] },
    { q: "Prokuraturada Iskandar kim bo'lib ishlar edi?", correct: "Muovin", wrongs: ["Boshliq", "Kotib", "Yordamchi"] },
    { q: "Bir vaqtlar harbiylar qal'asi sanalgan shaharning qoq markazida, chorak gektarcha keladigan, gulugulzor bog'i, otxonayu molxonasi bor joy qayer?", correct: "Xoji boboning chorbog'i", wrongs: ["Abdushukur akaning hovlisi", "Gena amakining otxonasi", "Prokuratura binosi"] },
    { q: "Bu yerlar asli kechagi zamondan davlat quri bergan... deb ataluvchi bir qolipdagi hovli-joylar edi, nima deb atalardi?", correct: "Obqomdan qolgan uylar", wrongs: ["Sovxozdan qolgan binolar", "Kolxozdan qolgan uylar", "Harbiy qismdan qolgan joylar"] },
    { q: "Xoji boboning hovlisi qanday usulda (kengaytirilgan) edi?", correct: "Sho'rocha", wrongs: ["Zamonaviy uslubda", "Yevropacha tarzda", "Milliy uslubda"] },
    { q: "Xoji bobo harbiy qismning eski bir bazasini sotib olib nima qilgan edi?", correct: "Otxonayu-molxona", wrongs: ["Omborxona", "Mehmonxona", "Ombor va do'kon"] },
    { q: "\"Birov miq etolmaydi, viloyatdagi bor mansabini bir-birini butining orasiga olib minib chiqqan Xoji bobomizning murutini bolta kesolmas\" iborasi nimani anglatadi?", correct: "Hammasi xususiy va qonuniy ekanligini", wrongs: ["Hammasi merosdan qolganini", "Hammasi davlat mulki ekanini", "Hammasi qarindoshlariniki ekanini"] },
    { q: "Xoji bobo avvaldan nimaga ishqiboz?", correct: "Otga", wrongs: ["Kiyikka", "Baliq ovlashga", "Mashinaga"] },
    { q: "Xoji boboning nechta oti bor?", correct: "4 ta", wrongs: ["3 ta", "5 ta", "2 ta"] },
    { q: "Biri qo'shni turkman ortidan tortiq bo'lib kelgan qanday ot edi?", correct: "Zotdor qorabayir", wrongs: ["Zotdor to'riq", "Zotdor jiyron", "Zotdor oq ot"] },
    { q: "Xoji bobo qachondan boshlab otga minmay qo'ygan?", correct: "Falonchi falonhiyevich atalib, do'rjiroq mansablarni egallagandan keyin", wrongs: ["Yoshi ulg'ayib, otga minish og'ir kelgandan keyin", "Shahar hokimi bo'lib tayinlangandan keyin", "Sog'lig'i yomonlashib, tabib taqiqlagandan keyin"] },
    { q: "Otxonaning olis bir burchagida yana nima ham bor qafasda?", correct: "Tog' ohusi", wrongs: ["Kiyik", "Tulki", "Bo'ri bolasi"] },
    { q: "Tog' ohusi uning qafasiga qayerdan kelib qolgan?", correct: "Mansabdor qarindoshlariga sovg'a sifatida", wrongs: ["Qo'shni davlatdan tortiq sifatida", "Ovchilar tomonidan sotib olingan", "Tug'ilgan kuniga sovg'a qilingan"] },
    { q: "Tog'lik nozaninning vazifasi nima?", correct: "Nozik mehmonlarga ko'rinib turish", wrongs: ["Bolalarni xursand qilish", "Hovlini bezash", "Mehmonlarni ovqatlantirish"] },
    { q: "Bu jonivorlarning bariga kim qaraydi?", correct: "Gena", wrongs: ["Jo'ra", "Shurik", "Abdushukur"] },
    { q: "Genaning asl ismi nima?", correct: "G'ani, G'aniqul", wrongs: ["Shokir, Shurik", "G'ayrat, G'ayratbek", "Jo'ra, Jo'rabek"] },
    { q: "Gena tog'a necha yoshda edi?", correct: "60+", wrongs: ["40+", "50+", "70+"] },
    { q: "Xoji boboga Gena tog'a kim bo'ladi?", correct: "Amakivachcha", wrongs: ["Tog'avachcha", "Xolavachcha", "Ammavachcha"] },
    { q: "Xoji onamizga kim bo'ladilar?", correct: "Ammavachcha", wrongs: ["Amakivachcha", "Tog'avachcha", "Xolavachcha"] },
    { q: "Xoji onaning ismi kim?", correct: "Adolat poshsha", wrongs: ["Marusa", "Dilrabo", "Xalima"] },
    { q: "Adolat poshshani kim deb atash farz (urug'i)?", correct: "Eshon xo'ja urug'idan bo'lgani uchun", wrongs: ["Amir avlodidan bo'lgani uchun", "Mulla oilasidan chiqqani uchun", "Sayyid nasabidan bo'lgani uchun"] },
    { q: "G'aniqul tog'a Xoji boboni kim deb chaqiradi?", correct: "Xo' Samar", wrongs: ["Xo' Iskan", "Xo' G'ani", "Xo' Jo'ra"] }
];

const ayats = [
    { text: "Robbing seni tark qilmadi va g'azab ham qilmadi.", meta: "Zuho 93:3" },
    { text: "Albatta bir qiyinchilik bilan osonchilik bordir.", meta: "Sharh 94:5" },
    { text: "Yaratgan Robbing nomi bilan o'qi!", meta: "Alaq 96:1" },
    { text: "O'qi, Robbing karamlilar karamlisidir.", meta: "Alaq 96:3" },
    { text: "Va tezda Robbing senga ato qilur va sen rozi bo'lursan.", meta: "Zuho 93:5" },
    { text: "Ammo kimki ato bersa va taqvo qilsa, va yaxshiliklarni tasdiq qilsa, bas, Biz uni osonga muyassar etamiz.", meta: "Layl 92:5-7" },
    { text: "Albatta hidoyatga boshlash Bizning zimmamizdadir.", meta: "Layl 92:12" },
    { text: "Va albatta tezda rozi bo'ladir.", meta: "Layl 92:21" },
    { text: "Seni oson yo'lga muyassar etamiz.", meta: "A'lo 87:8" },
    { text: "Bas, kim xohlasa Parvardigori tomon qaytadigan yo'lni tutar.", meta: "Naba 78:39" },
    { text: "Albatta Biz senga ochiq g'alaba berdik.", meta: "Fath 48:1" }
];

let activeQuiz = [];
let currentQ = 0, score = 0, answered = 0;

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function buildStars() {
    const container = document.getElementById('stars');
    container.innerHTML = '';
    const count = 100;
    for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        const size = (Math.random() * 2 + 1).toFixed(1);
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.animationDelay = (Math.random() * 2.5).toFixed(2) + 's';
        s.style.animationDuration = (1.5 + Math.random() * 2).toFixed(2) + 's';
        container.appendChild(s);
    }
}

let rangeStart = null;
let numButtons = [];

window.onload = function() {
    const grid = document.getElementById('numberGrid');
    for (let i = 1; i <= quizData.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.innerText = i;
        btn.onclick = () => pickNumber(i, btn);
        grid.appendChild(btn);
        numButtons.push(btn);
    }
    buildStars();

    const randomIdx = Math.floor(Math.random() * ayats.length);
    const selectedAyat = ayats[randomIdx];
    document.getElementById('random-ayat').innerHTML = `
        <div class="quran-box">
            <span class="quran-ayat-text">"${selectedAyat.text}"</span>
            <span class="quran-meta">${selectedAyat.meta}</span>
        </div>
    `;
};

function pickNumber(num, btnEl) {
    const info = document.getElementById('range-info');

    if (rangeStart === null) {
        rangeStart = num;
        btnEl.classList.add('picked');
        info.innerText = `Boshlang'ich: ${num}. Endi oxirgi raqamni tanlang`;
    } else {
        let start = rangeStart;
        let end = num;
        if (end < start) { const t = start; start = end; end = t; }
        btnEl.classList.add('picked');
        info.innerText = `Tanlandi: ${start} - ${end}`;
        setTimeout(() => startWithRange(start, end), 400);
    }
}

function startWithRange(start, end) {
    activeQuiz = quizData.slice(start - 1, end);
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('mode-screen').style.display = 'flex';
}

let quizMode = 'quiz';

function chooseMode(mode) {
    quizMode = mode;
    if (mode === 'quiz-aralash' || mode === 'yopiq-aralash') {
        activeQuiz = shuffle([...activeQuiz]);
    }
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('intro-screen').style.display = 'flex';
    document.getElementById('intro-screen').style.opacity = '1';
    startTimer();
}

function startTimer() {
    let count = 3;
    let disp = document.getElementById("countdown");
    disp.innerText = count;
    let timer = setInterval(() => {
        count--;
        if (count > 0) {
            disp.innerText = count;
        } else if (count === 0) {
            disp.innerText = "Boshladik!";
        } else {
            clearInterval(timer);
            document.getElementById("intro-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("intro-screen").style.display = "none";
                document.getElementById("quiz").style.display = "block";
                loadQ();
            }, 800);
        }
    }, 1000);
}

function getOptionsFor(qData) {
    return shuffle([qData.correct, ...qData.wrongs]);
}

function loadQ() {
    const qData = activeQuiz[currentQ];
    document.getElementById('question').innerText = `${currentQ + 1}/${activeQuiz.length}. ${qData.q}`;
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';

    if (quizMode === 'yopiq' || quizMode === 'yopiq-aralash') {
        loadClosedQ(qData, optDiv);
    } else {
        loadMultipleChoiceQ(qData, optDiv);
    }
}

function loadMultipleChoiceQ(qData, optDiv) {
    let shuffledOptions = getOptionsFor(qData);

    shuffledOptions.forEach((opt) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => check(opt, btn, qData.correct);
        optDiv.appendChild(btn);
    });
}

function loadClosedQ(qData, optDiv) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'closed-input';
    input.id = 'closed-answer';
    input.placeholder = 'Javob yozing...';
    input.onkeypress = (e) => { if (e.key === 'Enter') checkClosed(qData); };

    const checkBtn = document.createElement('button');
    checkBtn.className = 'btn-check';
    checkBtn.innerText = 'Tekshirish';
    checkBtn.onclick = () => checkClosed(qData);

    const resultDiv = document.createElement('div');
    resultDiv.id = 'closed-result';

    optDiv.appendChild(input);
    optDiv.appendChild(checkBtn);
    optDiv.appendChild(resultDiv);

    input.focus();
}

function checkClosed(qData) {
    const inputEl = document.getElementById('closed-answer');
    const resultDiv = document.getElementById('closed-result');
    const user = inputEl.value.toLowerCase().trim();
    const correct = qData.correct.toLowerCase().trim();

    answered++;
    inputEl.disabled = true;
    document.querySelector('.btn-check').disabled = true;

    if (user === correct) {
        resultDiv.innerHTML = '<b style="color:#00ff99;">✅ To\'g\'ri</b>';
        score++;
    } else {
        resultDiv.innerHTML = '<b style="color:#ff4444;">❌ Noto\'g\'ri.</b><br> Javob: ' + qData.correct;
    }

    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 2000);
}

function check(selected, element, correct) {
    const options = element.parentElement.querySelectorAll('.option');
    options.forEach(opt => opt.style.pointerEvents = 'none');
    answered++;

    if (selected === correct) {
        element.classList.add('correct');
        score++;
    } else {
        element.classList.add('wrong');
        options.forEach(opt => {
            if (opt.innerText === correct) opt.classList.add('correct');
        });
    }
    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 1000);
}

function finishQuiz() {
    let wrong = answered - score;
    document.getElementById('quiz').innerHTML = `
        <h2>Natijalar</h2>
        <div style="line-height: 2.2; font-size: 19px;">
            Jami savollar: <b>${activeQuiz.length} ta</b><br>
            To'g'ri javoblar: <span style="color:#00ff99;">${score} ta</span><br>
            Xato javoblar: <span style="color:#ff4d4d;">${wrong} ta</span>
        </div>
        <button class="btn-finish" onclick="location.reload()">Qaytadan boshlash</button>
    `;
}
</script>

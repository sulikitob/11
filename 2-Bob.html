<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad A'zam.Til nomusi yopiq savol-javob</title>
<style>
    body { margin:0; padding:0; background:#111; font-family:Arial; color:white; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    #startScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index:9999; padding:20px; }
    #startScreen h1 { color:#00ff99; font-size:50px; }
    .oyat { max-width:800px; font-size:28px; line-height:1.8; color:#ddd; margin-top:20px; }
    #startScreen h3 { color:#00ff99; margin-top:20px; }
    #count { font-size:100px; color:#00ff99; margin-top:40px; animation:pulse 1s infinite; }
    @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
    .box { width:650px; background:#1e1e1e; padding:30px; border-radius:20px; text-align:center; box-shadow:0 0 20px black; }
    h2 { color:#00ff99; }
    input { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; font-size:18px; }
    button { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; background:#00ff99; color:black; font-weight:bold; cursor:pointer; font-size:18px; }
    #result { margin-top:15px; font-size:20px; }
</style>
</head>
<body>

<div id="startScreen">
    <h1>📚1.Bob.Buzuq til havosi </h1>
    <p class="oyat">“Robbing seni tark etmadi va g‘azab ham qilmadi.<br> Albatta oxirat sen uchun bu dunyodan yaxshidir.”</p>
    <h3>🌙 Zuho surasi 93:3-4</h3>
    <div id="count">3</div>
</div>

<div class="box">
    <h2 id="question"></h2>
    <input type="text" id="answer" placeholder="Javob yozing...">
    <button onclick="check()">Tekshirish</button>
    <button onclick="finishQuiz()" style="background:#ff4444; color:white; margin-top:10px;">Testni tugatish</button>
    <div id="result"></div>
</div>

<script>
    /* COUNTDOWN */
    let time = 3;
    let timer = setInterval(()=>{
        document.getElementById("count").innerText = time;
        time--;
        if(time < 0){
            clearInterval(timer);
            document.getElementById("startScreen").style.display="none";
        }
    },1000);

    /* QUIZ DATA */
const quizData = [
    { q: "Qoramollarda bo'ladigan Bo'ka, So'na, O'qaloq, Qataloqni cho'qqilab yeydigan qush", correct: "Mayna", wrongs: ["Musicha", "Chumchuq", "Qora qarg'a"] },
    { q: "Boshqa katta parrandalarning tuxumini, kichkinalarning palaponini yeydigan, ekologik muvozanatga rahna solgan qush", correct: "Mayna", wrongs: ["Qora qarg'a", "Musicha", "Chumchuq"] },
    { q: "Mamlakatimizga mayna qushi sabab hamma yoqni qaysi qush bosdi?", correct: "Qora qarg'a", wrongs: ["Qizil ishton", "Mayna", "Musicha"] },
    { q: "Mamlakatimizda mayna va qora qarg'a dastidan faqat 2 tagina qush qoldi xolos, qaysi qush?", correct: "Musicha chumchuq", wrongs: ["Qizilishton qora qarg'a", "Sassiqpopshak qaldirg'och", "Kabutar va chumchuq"] },
    { q: "Дуб qaysi daraxt?", correct: "Eman", wrongs: ["Dafna", "Chinor", "Terak"] },
    { q: "сосна qaysi daraxt?", correct: "Qarag'ay", wrongs: ["Chinor", "Eman", "Terak"] },
    { q: "берёза qaysi daraxt?", correct: "Qayin", wrongs: ["Majnuntol", "Terak", "Archa"] },
    { q: "Балут qaysi daraxt?", correct: "Eman", wrongs: ["Terak", "Qayin", "Majnuntol"] },
    { q: "1859 yilda Avstraliyadan uyda boqiladigan quyon keltiriladi, nechtasi erkinlikka qo'yib yuboriladi?", correct: "24", wrongs: ["20", "30", "18"] },
    { q: "1865 yilda quyonlar soni 1 mln yetadi va dehqonchilikka katta zarar yetkazadi. Zararni cheklash muammo hozir", correct: "1 mln", wrongs: ["0.5 mln", "10 mln", "Sal kam mln"] },
    { q: "Сазан qaysi baliq?", correct: "Zog'ora baliq", wrongs: ["Cho'rtan", "Oq amur", "Do'ng bosh"] },
    { q: "сазан o'zbekchada yana qanday ataladi?", correct: "Tangabaliq", wrongs: ["Tovonbaliq", "Zogora", "Oq amur"] },
    { q: "беламур qanday baliq?", correct: "Oq amur", wrongs: ["Do'ngbosh", "Tovonbaliq", "Cho'rtan"] },
    { q: "Щука qaysi baliq?", correct: "Cho'rtan", wrongs: ["Tangabaliq", "Zogora", "Tovon baliq"] },
    { q: "Толсталоб o'zbekchada?", correct: "Do'ngpeshona", wrongs: ["Zogora", "Cho'rtan", "Oq amur"] },
    { q: "крахмални yana qanday atasa bo'ladi?", correct: "Nishasta", wrongs: ["Nisholda", "Kukuncha", "Kukun"] },
    { q: "простыня o'zbekchada?", correct: "Xushki", wrongs: ["Xobgi", "Yopinchiq", "Taglik"] },
    { q: "Спални o'zbekchada qanday ataladi?", correct: "Xobgoh", wrongs: ["Xushki", "Galast", "Nishasta"] },
    { q: "Kurka (induk)ni g'ulg'ul tovuq, g'ulg'ul deb qayerda aytishadi?", correct: "Samarqand", wrongs: ["Toshkent", "O'zbekiston", "Farg'ona"] },
    { q: "Kurkani (induqni) tuyatovuq deb qayerda aytishadi?", correct: "Hammasi to'g'ri", wrongs: ["Qashqadaryo", "Zomin", "Qoraqalpoq"] },
    { q: "Kurka va Indukning asl nomi nima?", correct: "Hammasi", wrongs: ["Ular", "Turkiston ulari", "Ulari"] },
    { q: "Kaktus nima deyiladi?", correct: "Kumanjir", wrongs: ["Tikanli gul", "Kaknus guli", "Kukjir"] },
    { q: "Tropik o'zbekchada qanday ataladi?", correct: "O'rmon", wrongs: ["Yovvoyi", "Hayvonlar olami", "Hayvoniy"] },
    { q: "Tinch okeani o'zbekchada qanday ataladi?", correct: "Baxri muxit kabir", wrongs: ["Bazri muxit xindi", "Bazri Xazar", "Baxri muxit otlosi"] },
    { q: "Atlantik okeani qanday ataladi?", correct: "Baxri muhit otlosi", wrongs: ["Baxri muhit kabir", "Baxri muhit xindi", "Baxri xazar"] },
    { q: "Hind okeani qanday ataladi?", correct: "Baxri muhit xindi", wrongs: ["Baxri muhit kabir", "Baxri muhit otlosi", "Baxri muhit xazar"] },
    { q: "Baxri Xazar qayer?", correct: "Kasbiy dengiz", wrongs: ["O'lik dengiz", "Atlanika okeani", "Hind okeani"] },
    { q: "Shom qayer?", correct: "Suriya", wrongs: ["Qohira", "Shvetsiya", "Avg'oniston"] },
    { q: "Mongoliya asli?", correct: "Mo'g'uliston", wrongs: ["Madacascar", "Madrid", "Mog'ullar yurti"] },
    { q: "Пулемёт o'zbekchada?", correct: "O'qsochar", wrongs: ["O'qdon", "Avtomat", "Qalashnik"] },
    { q: "Saxara qayer?", correct: "Sahroyi kabir", wrongs: ["Sahrosi kop joylar", "Tuzli sahro", "Shahar"] },
    { q: "Samovar nima?", correct: "O'zi qaynar", wrongs: ["Suv qaynatadigan", "Choy qaynatadigan", "Choy quygich"] },
    { q: "Afrikani nima deyishgan?", correct: "Xabashiston", wrongs: ["Lubon", "Bolgariya", "Olmoniya"] },
    { q: "Germaniya o'zbek tilida?", correct: "Olmoniya", wrongs: ["Alman", "Quddus", "Xabashiston"] },
    { q: "Болгария o'zbekchada?", correct: "Bulg'oriston", wrongs: ["Belglar", "Bulgorlar", "Bolgarlar"] },
    { q: "Vengriya qanday ataladi?", correct: "Mojariston", wrongs: ["Vengryaliklar", "Vengirlar", "Moguliston"] },
    { q: "Livan o'zbekcha atamasi?", correct: "Lubnon", wrongs: ["Lubon", "Luyon", "Libar"] },
    { q: "Falastinning o'zbekcha nomi?", correct: "Quddus", wrongs: ["Jeruselim", "Togri javob yoq", "Ierusalim"] },
    { q: "Afrikaning habashistonida cho'l kalamushini (yumronqoziqni) tutib yeydigan jonivor aslida nima?", correct: "Do'lta bo'ri", wrongs: ["Xabashiston borisi", "Afiopiya shoqoli", "Shoqol bo'ri"] },
    { q: "Bir hujjatli filmda quloq-chi katta ola bula yovvoyi it darrandani shoqol deyishgan, aslida nima edi?", correct: "Sirtlon it", wrongs: ["Guyena", "Chiyabori", "Giena"] },
    { q: "Amerikada yashovchi kayot o'zbekchada nima?", correct: "Chiya bori", wrongs: ["Shoqol", "Shog'al", "Sirtlon it"] }
];

    let i = 0;
    let score = 0;

    function load(){
        document.getElementById("result").innerHTML = "";
        document.getElementById("answer").value = "";
        document.getElementById("question").innerText = (i + 1) + "/" + quiz.length + ". " + quiz[i].question;
    }

    function check(){
        let user = document.getElementById("answer").value.toLowerCase().trim();
        let correct = quiz[i].correct.toLowerCase();

        if(user === correct){
            document.getElementById("result").innerHTML = "✅ To'g'ri";
            score++;
        } else {
            document.getElementById("result").innerHTML = "❌ Noto'g'ri. To'g'ri javob: " + quiz[i].correct;
        }

        setTimeout(()=>{
            i++;
            if(i < quiz.length){
                load();
            } else {
                finishQuiz();
            }
        }, 1500);
    }

    function finishQuiz() {
        i = quiz.length;
        document.getElementById("question").innerText = "🎉 Quiz Yakunlandi";
        document.getElementById("answer").style.display = "none";
        
        document.querySelectorAll(".box > button").forEach(b => b.style.display = "none");
        
        document.getElementById("result").innerHTML = `
            <div style="font-size:24px; color:#fff; line-height:2;">
                ✅ To'g'ri: <b style="color:#00ff99;">${score}</b><br>
                ❌ Noto'g'ri: <b style="color:#ff4444;">${quiz.length - score}</b><br>
                Yakuniy natija: <b>${score} / ${quiz.length}</b>
            </div>
            <button onclick="location.reload()" style="background:#00ff99; margin-top:20px;">🔄 Qayta ishlash</button>
        `;
    }

    load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Yosh Kitobxon 2026-2027-yil 20-30 yosh toifasi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 0; 
            background: #111; 
            font-family: Arial, sans-serif; 
            color: white; 
            position: relative; 
            overflow-x: hidden;
            width: 100%;
        }
        
        /* Yulduzlar uchun orqa fon */
        #stars-layer {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: -1; 
            pointer-events: none;
            opacity: 0;
            animation: mainFadeIn 1s ease forwards 4.4s;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        header { 
            background: #1e1e1e; 
            padding: 20px 12px; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold; 
            color: #00ff99; 
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            animation: mainFadeIn 1s ease forwards 4.4s;
            flex-wrap: wrap;
        }

        .container { 
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 20px; 
            opacity: 0;
            animation: mainFadeIn 1s ease forwards 4.4s;
        }

        @keyframes mainFadeIn {
            to { opacity: 1; }
        }

        /* ===== OLTIN KALLIGRAFIYA EKRANI: "Yaratgan Robbing nomi bilan o'qi" ===== */
        .calligraphy-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 98;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: callyFadeIn 0.6s ease forwards 4.4s,
                       callyFadeOut 1s ease forwards 8s;
        }

        @keyframes callyFadeIn { to { opacity: 1; } }
        @keyframes callyFadeOut { to { opacity: 0; visibility: hidden; } }

        .cally-text {
            font-family: 'Great Vibes', 'Segoe Script', 'Lucida Handwriting', cursive;
            font-size: 58px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: baseline;
            max-width: 85%;
            text-align: center;
            padding: 0 20px;
            row-gap: 6px;
        }

        .cally-text span {
            opacity: 0;
            display: inline-block;
            transform: translateY(14px);
            background: linear-gradient(110deg, #8a6a12 0%, #ffe89b 22%, #fffceb 42%, #ffcc00 60%, #a8790a 82%, #ffe89b 100%);
            background-size: 260% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.55));
            animation: callyLetter 0.5s ease forwards, goldShimmer 2.6s linear infinite;
        }

        @keyframes callyLetter {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes goldShimmer {
            0% { background-position: 0% center; }
            100% { background-position: 260% center; }
        }

        @media(max-width:600px) {
            .cally-text { font-size: 34px; }
        }

        /* ===== SARLAVHA IKKI CHETIDA QOLIB KETUVCHI OLTIN KALLIGRAFIK YOZUV ===== */
        .cally-badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            font-family: 'Great Vibes', 'Segoe Script', 'Lucida Handwriting', cursive;
            font-size: 30px;
            line-height: 1;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255,204,0,0.9), 0 0 22px rgba(255,204,0,0.6);
            opacity: 0;
            transform: scale(0);
            animation: badgeAppear 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 8.2s;
            flex-shrink: 0;
            white-space: nowrap;
            padding: 2px 4px;
        }

        @keyframes badgeAppear {
            to { opacity: 1; transform: scale(1); }
        }

        .cally-badge .sparkle-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff8d6;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px #ffcc00;
            pointer-events: none;
            animation-name: twinkle;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        /* Kitoblar Gridi */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 40px; 
            width: 100%;
        }

        .book { 
            background: #1e1e1e; 
            border-radius: 20px; 
            transition: 0.4s; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
            text-decoration: none; 
            color: white; 
            display: flex;
            flex-direction: column; 
            border: 2px solid transparent; 
            padding: 15px;
            width: 100%;
        }

        .book:hover { 
            transform: scale(1.03); 
            box-shadow: 0 0 20px rgba(0,255,153,0.3); 
            border: 2px solid #00ff99; 
        }

        .book img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 12px;
            display: block;
        }

        .title-box { 
            background: #222; 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            min-height: 85px; 
            display: flex;
            align-items: center; 
            justify-content: center;
            border-top: 3px solid #FFD700; 
            width: 100%;
        }

        .book p { 
            font-size: 15px; 
            font-weight: bold; 
            margin: 0; 
            color: white; 
            width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* ===== MOBIL EKRANLAR UCHUN TO'LIQ MOSLASHUV ===== */
        @media(max-width:600px) {
            .container {
                padding: 0 12px 20px;
            }

            .grid { 
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .book {
                padding: 10px;
            }

            .book img {
                height: 220px;
            }

            header { 
                font-size: 20px; 
                padding: 16px 10px;
                gap: 8px;
            }

            .cally-badge {
                font-size: 18px;
            }
        }

        @media(max-width:360px) {
            header { font-size: 17px; }
            .book img { height: 190px; }
        }

        /* ===== INTRO: GULLAR BO'RONI ===== */
        .intro-screen {
            position: fixed;
            inset: 0;
            background: #06030c;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeOutIntro 0.8s cubic-bezier(0.7, 0, 0.3, 1) forwards 3.6s;
        }

        @keyframes fadeOutIntro {
            to { opacity: 0; visibility: hidden; }
        }

        .vortex-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            mix-blend-mode: screen;
        }

        .intro-petal {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #ffffff, #ffd1dc 45%, #ff8fb1);
            border-radius: 70% 30% 70% 30%;
            opacity: 0;
            transform-origin: center;
            animation: hyperTornado var(--dur) cubic-bezier(0.25, 1, 0.3, 1) forwards var(--del);
        }

        @keyframes hyperTornado {
            0% { transform: rotate(var(--rot)) translateX(var(--rad-start)) rotate(0deg) scale(0); opacity: 0; }
            5% { opacity: 1; }
            65% { transform: rotate(calc(var(--rot) + 2520deg)) translateX(var(--rad-end)) rotate(2520deg) scale(var(--sc)); opacity: 0.95; }
            80%, 100% { transform: rotate(calc(var(--rot) + 2880deg)) translateX(0) rotate(3240deg) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="intro-screen">
        <div class="vortex-container" id="vortex"></div>
    </div>

    <div class="calligraphy-screen">
        <div class="cally-text" id="cally-text"></div>
    </div>

    <div id="stars-layer"></div>

    <header>
        <span class="cally-badge cally-badge-left" id="cally-left">Yaratgan Robbing ✦</span>
        📚 Yosh Kitobxon 2026-2027 (20-30 yosh)
        <span class="cally-badge cally-badge-right" id="cally-right">✦ nomi bilan o'qi</span>
    </header>

    <div class="container">
        <div class="grid">
            <a href="momoqaldiroq ostida sayr.html" target="_blank" class="book">
                <img src="sayr.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>E'rkin A'zam  <br> Momoqaldiroq ostida sayr</p></div>
            </a>
            
            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="til.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Ahmad A'zam <br> Til nomusi </p></div>
            </a>
            
            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="izidan.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Eshqobil Shukur <br> Bobo so'z izidan</p></div>
            </a>

            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="tong.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Said Ahmad <br> Kiprikda qolgan tong</p></div>
            </a>

            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="vatan.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>A'zam Xoshimiy <br> Alvido Vatan</p></div>
            </a>
        </div>
    </div>

    <script>
        const vortex = document.getElementById('vortex');
        const totalIntroPetals = 1500;
        for (let i = 0; i < totalIntroPetals; i++) {
            const petal = document.createElement('div');
            petal.className = 'intro-petal';
            const rot = Math.random() * 360;
            const radStart = (50 + Math.random() * 45) + 'vw';
            const radEnd = (100 + Math.random() * 450) + 'px';
            const dur = (1.5 + Math.random() * 1.2).toFixed(2) + 's';
            const del = (Math.random() * 2.2).toFixed(2) + 's';
            const size = Math.floor(6 + Math.random() * 10);
            const sc = (0.7 + Math.random() * 0.6).toFixed(1);

            petal.style.setProperty('--rot', rot + 'deg');
            petal.style.setProperty('--rad-start', radStart);
            petal.style.setProperty('--rad-end', radEnd);
            petal.style.setProperty('--dur', dur);
            petal.style.setProperty('--del', del);
            petal.style.setProperty('--sc', sc);
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            vortex.appendChild(petal);
        }

        const starsLayer = document.getElementById('stars-layer');
        for(let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + "s");
            star.style.animationDelay = Math.random() * 5 + "s";
            starsLayer.appendChild(star);
        }

        /* ===== OLTIN KALLIGRAFIYA MATNI: harf-barharf yozilishi ===== */
        const callyPhrase = "✦ Yaratgan Robbing nomi bilan o'qi ✦";
        const callyContainer = document.getElementById('cally-text');
        const letterStartDelay = 4.6;   // soniya — ekran ochilgach boshlanadi
        const letterStagger = 0.045;    // har bir harf orasidagi farq

        [...callyPhrase].forEach((ch, i) => {
            const span = document.createElement('span');
            span.textContent = ch === ' ' ? '\u00A0' : ch;
            const letterDelay = (letterStartDelay + i * letterStagger);
            const shimmerOffset = (Math.random() * 1.2).toFixed(2);
            // ikkita animatsiya: callyLetter (paydo bo'lish) va goldShimmer (tovlanish)
            span.style.animationDelay = letterDelay + 's, ' + shimmerOffset + 's';
            callyContainer.appendChild(span);
        });

        /* ===== SARLAVHA ATROFIDAGI OLTIN BEZAKLARGA TINMAY PORILLOVCHI YULDUZCHALAR ===== */
        function addSparkles(el, count) {
            for (let i = 0; i < count; i++) {
                const star = document.createElement('span');
                star.className = 'sparkle-star';
                star.style.top = Math.random() * 80 + '%';
                star.style.left = Math.random() * 80 + '%';
                star.style.animationDuration = (0.8 + Math.random() * 1.4) + 's';
                star.style.animationDelay = (Math.random() * 1.5) + 's';
                el.appendChild(star);
            }
        }

        window.addEventListener('load', function () {
            setTimeout(function () {
                addSparkles(document.getElementById('cally-left'), 6);
                addSparkles(document.getElementById('cally-right'), 6);
            }, 9000); // oltin bezaklar joyiga tushgach ishga tushadi
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=0.3, maximum-scale=1.0, user-scalable=yes">
    <title>Yosh Kitobxon 2026-2027-yil 20-30 yosh toifasi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 0; 
            background: #111; 
            font-family: Arial, sans-serif; 
            color: white; 
            position: relative; 
            overflow-x: hidden;
            width: 100%;
        }
        
        /* Yulduzlar uchun orqa fon */
        #stars-layer {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: -1; 
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        header { 
            background: #1e1e1e; 
            padding: 20px 12px; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold; 
            color: #00ff99; 
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .container { 
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 20px; 
        }

        /* ===== SARLAVHA IKKI CHETIDAGI OLTIN KALLIGRAFIK YOZUV (statik, taymerdagi kabi) ===== */
        .cally-badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            font-family: 'Great Vibes', 'Segoe Script', 'Lucida Handwriting', cursive;
            font-size: 30px;
            line-height: 1;
            white-space: nowrap;
            background: linear-gradient(110deg, #8a6a12 0%, #ffe89b 22%, #fffceb 42%, #ffcc00 60%, #a8790a 82%, #ffe89b 100%);
            background-size: 260% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.55));
            animation: goldShimmer 2.6s linear infinite;
            padding: 2px 4px;
        }

        @keyframes goldShimmer {
            0% { background-position: 0% center; }
            100% { background-position: 260% center; }
        }

        .cally-badge .sparkle-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff8d6;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px #ffcc00;
            pointer-events: none;
            animation-name: twinkle;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        /* Kitoblar Gridi */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 40px; 
            width: 100%;
        }

        .book { 
            background: #1e1e1e; 
            border-radius: 20px; 
            transition: 0.4s; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
            text-decoration: none; 
            color: white; 
            display: flex;
            flex-direction: column; 
            border: 2px solid transparent; 
            padding: 15px;
            width: 100%;
        }

        .book:hover { 
            transform: scale(1.03); 
            box-shadow: 0 0 20px rgba(0,255,153,0.3); 
            border: 2px solid #00ff99; 
        }

        .book img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 12px;
            display: block;
        }

        .title-box { 
            background: #222; 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            min-height: 85px; 
            display: flex;
            align-items: center; 
            justify-content: center;
            border-top: 3px solid #FFD700; 
            width: 100%;
        }

        .book p { 
            font-size: 15px; 
            font-weight: bold; 
            margin: 0; 
            color: white; 
            width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* ===== MOBIL EKRANLAR UCHUN TO'LIQ MOSLASHUV ===== */
        @media(max-width:600px) {
            .container {
                padding: 0 12px 20px;
            }

            .grid { 
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .book {
                padding: 10px;
            }

            .book img {
                height: 220px;
            }

            header { 
                font-size: 20px; 
                padding: 16px 10px;
                gap: 8px;
            }

            .cally-badge {
                font-size: 18px;
            }
        }

        @media(max-width:360px) {
            header { font-size: 17px; }
            .book img { height: 190px; }
        }
    </style>
</head>
<body>

    <div id="stars-layer"></div>

    <header>
        <span class="cally-badge cally-badge-left" id="cally-left">✦Yaratgan Robbing</span>
        📚 Yosh Kitobxon 2026-2027 (20-30 yosh)
        <span class="cally-badge cally-badge-right" id="cally-right">nomi bilan o'qi ✦</span>
    </header>

    <div class="container">
        <div class="grid">
            <a href="momoqaldiroq ostida sayr.html" target="_blank" class="book">
                <img src="sayr.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>E'rkin A'zam  <br> Momoqaldiroq ostida sayr</p></div>
            </a>
            
            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="til.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Ahmad A'zam <br> Til nomusi </p></div>
            </a>
            
            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="izidan.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Eshqobil Shukur <br> Bobo so'z izidan</p></div>
            </a>

            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="tong.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Said Ahmad <br> Kiprikda qolgan tong</p></div>
            </a>

            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="vatan.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>A'zam Xoshimiy <br> Alvido Vatan</p></div>
            </a>
        </div>
    </div>

    <script>
        // ===== Yulduzlar (orqa fon) =====
        const starsLayer = document.getElementById('stars-layer');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + "s");
            star.style.animationDelay = Math.random() * 5 + "s";
            starsLayer.appendChild(star);
        }

        // ===== Header belgilari atrofidagi porillovchi yulduzchalar =====
        function addSparkles(el, count) {
            for (let i = 0; i < count; i++) {
                const star = document.createElement('span');
                star.className = 'sparkle-star';
                star.style.top = Math.random() * 80 + '%';
                star.style.left = Math.random() * 80 + '%';
                star.style.animationDuration = (0.8 + Math.random() * 1.4) + 's';
                star.style.animationDelay = (Math.random() * 1.5) + 's';
                el.appendChild(star);
            }
        }
        addSparkles(document.getElementById('cally-left'), 3);
        addSparkles(document.getElementById('cally-right'), 3);
    </script>
</body>
</html>

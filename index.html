<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=0.3, maximum-scale=1.0, user-scalable=yes">
    <title>Yosh Kitobxon 2026-2027-yil 20-30 yosh toifasi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 0; 
            background: #111; 
            font-family: Arial, sans-serif; 
            color: white; 
            position: relative; 
            overflow-x: hidden;
            width: 100%;
        }
        
        /* Yulduzlar uchun orqa fon */
        #stars-layer {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: -1; 
            pointer-events: none;
            opacity: 0;
            animation: mainFadeIn 1s ease forwards 4.4s;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        header { 
            background: #1e1e1e; 
            padding: 20px 12px; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold; 
            color: #00ff99; 
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            animation: mainFadeIn 1s ease forwards 4.4s;
            flex-wrap: wrap;
        }

        .container { 
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 20px; 
            opacity: 0;
            animation: mainFadeIn 1s ease forwards 4.4s;
        }

        @keyframes mainFadeIn {
            to { opacity: 1; }
        }

        /* ===== OLTIN KALLIGRAFIYA EKRANI ===== */
        /* Bu ekran endi CSS bilan avtomatik yo'qolmaydi — u JS orqali,
           matn header'dagi joyiga "uchib borib" bo'lgach, o'chiriladi. */
        .calligraphy-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 98;
            opacity: 0;
            animation: callyFadeIn 0.8s ease forwards 3.6s; /* intro bilan bir vaqtda crossfade */
            transition: opacity 0.8s ease;
        }

        @keyframes callyFadeIn { to { opacity: 1; } }

        .calligraphy-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Markazda joylashgan, keyin ikkiga bo'linib header tomon "uchadigan" yozuv */
        .cally-typing-wrap {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 22px;
            flex-wrap: wrap;
            width: 90%;
            max-width: 1000px;
            pointer-events: none;
        }

        .cally-fly {
            font-family: 'Great Vibes', 'Segoe Script', 'Lucida Handwriting', cursive;
            font-size: 58px;
            line-height: 1;
            white-space: nowrap;
            will-change: transform;
        }

        .cally-letter {
            opacity: 0;
            display: inline-block;
            transform: translateY(14px);
            background: linear-gradient(110deg, #8a6a12 0%, #ffe89b 22%, #fffceb 42%, #ffcc00 60%, #a8790a 82%, #ffe89b 100%);
            background-size: 260% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.55));
            animation: callyLetter 0.5s ease forwards, goldShimmer 2.6s linear infinite;
        }

        @keyframes callyLetter {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes goldShimmer {
            0% { background-position: 0% center; }
            100% { background-position: 260% center; }
        }

        @media(max-width:600px) {
            .cally-fly { font-size: 30px; }
            .cally-typing-wrap { gap: 10px; }
        }

        /* ===== SARLAVHA IKKI CHETIDA QOLADIGAN OLTIN KALLIGRAFIK YOZUV ===== */
        /* Bular — parvozning YAKUNIY manzili. Matn shu joyga "qo'nadi". */
        .cally-badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            font-family: 'Great Vibes', 'Segoe Script', 'Lucida Handwriting', cursive;
            font-size: 30px;
            line-height: 1;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255,204,0,0.9), 0 0 22px rgba(255,204,0,0.6);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.25s ease;
            flex-shrink: 0;
            white-space: nowrap;
            padding: 2px 4px;
        }

        .cally-badge.landed {
            visibility: visible;
            opacity: 1;
        }

        .cally-badge .sparkle-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff8d6;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px #ffcc00;
            pointer-events: none;
            animation-name: twinkle;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        /* Markazdagi yozuv ikki chetida turadigan, keyin joyiga birga uchib
           boradigan 2 ta yulduzcha */
        .travel-sparkle {
            position: fixed;
            width: 5px;
            height: 5px;
            background: #fff8d6;
            border-radius: 50%;
            box-shadow: 0 0 8px 3px #ffcc00;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            animation: travelSparkleIn 0.4s ease forwards, twinkle 1.4s ease-in-out infinite 0.4s;
        }

        @keyframes travelSparkleIn {
            to { opacity: 1; }
        }

        /* Kitoblar Gridi */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 40px; 
            width: 100%;
        }

        .book { 
            background: #1e1e1e; 
            border-radius: 20px; 
            transition: 0.4s; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
            text-decoration: none; 
            color: white; 
            display: flex;
            flex-direction: column; 
            border: 2px solid transparent; 
            padding: 15px;
            width: 100%;
        }

        .book:hover { 
            transform: scale(1.03); 
            box-shadow: 0 0 20px rgba(0,255,153,0.3); 
            border: 2px solid #00ff99; 
        }

        .book img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 12px;
            display: block;
        }

        .title-box { 
            background: #222; 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            min-height: 85px; 
            display: flex;
            align-items: center; 
            justify-content: center;
            border-top: 3px solid #FFD700; 
            width: 100%;
        }

        .book p { 
            font-size: 15px; 
            font-weight: bold; 
            margin: 0; 
            color: white; 
            width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* ===== MOBIL EKRANLAR UCHUN TO'LIQ MOSLASHUV ===== */
        @media(max-width:600px) {
            .container {
                padding: 0 12px 20px;
            }

            .grid { 
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .book {
                padding: 10px;
            }

            .book img {
                height: 220px;
            }

            header { 
                font-size: 20px; 
                padding: 16px 10px;
                gap: 8px;
            }

            .cally-badge {
                font-size: 18px;
            }
        }

        @media(max-width:360px) {
            header { font-size: 17px; }
            .book img { height: 190px; }
        }

        /* ===== INTRO: GULLAR BO'RONI ===== */
        .intro-screen {
            position: fixed;
            inset: 0;
            background: #06030c;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 97;
            animation: fadeOutIntro 0.8s cubic-bezier(0.7, 0, 0.3, 1) forwards 3.6s;
        }

        @keyframes fadeOutIntro {
            to { opacity: 0; visibility: hidden; }
        }

        .vortex-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            mix-blend-mode: screen;
        }

        .intro-petal {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #ffffff, #ffd1dc 45%, #ff8fb1);
            border-radius: 70% 30% 70% 30%;
            opacity: 0;
            transform-origin: center;
            animation: hyperTornado var(--dur) cubic-bezier(0.25, 1, 0.3, 1) forwards var(--del);
        }

        @keyframes hyperTornado {
            0% { transform: rotate(var(--rot)) translateX(var(--rad-start)) rotate(0deg) scale(0); opacity: 0; }
            5% { opacity: 1; }
            65% { transform: rotate(calc(var(--rot) + 2520deg)) translateX(var(--rad-end)) rotate(2520deg) scale(var(--sc)); opacity: 0.95; }
            80%, 100% { transform: rotate(calc(var(--rot) + 2880deg)) translateX(0) rotate(3240deg) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="intro-screen">
        <div class="vortex-container" id="vortex"></div>
    </div>

    <div class="calligraphy-screen" id="calligraphy-screen">
        <div class="cally-typing-wrap">
            <span class="cally-fly" id="fly-left"></span>
            <span class="cally-fly" id="fly-right"></span>
        </div>
    </div>

    <div id="stars-layer"></div>

    <header>
        <span class="cally-badge cally-badge-left" id="cally-left">✦Yaratgan Robbing</span>
        📚 Yosh Kitobxon 2026-2027 (20-30 yosh)
        <span class="cally-badge cally-badge-right" id="cally-right">nomi bilan o'qi ✦</span>
    </header>

    <div class="container">
        <div class="grid">
            <a href="momoqaldiroq ostida sayr.html" target="_blank" class="book">
                <img src="sayr.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>E'rkin A'zam  <br> Momoqaldiroq ostida sayr</p></div>
            </a>
            
            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="til.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Ahmad A'zam <br> Til nomusi </p></div>
            </a>
            
            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="izidan.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Eshqobil Shukur <br> Bobo so'z izidan</p></div>
            </a>

            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="tong.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>Said Ahmad <br> Kiprikda qolgan tong</p></div>
            </a>

            <a href="kiptikda qolgan tong chiqish sanasi.html" target="_blank" class="book">
                <img src="vatan.jpg" alt="Kitob muqovasi">
                <div class="title-box"><p>A'zam Xoshimiy <br> Alvido Vatan</p></div>
            </a>
        </div>
    </div>

    <script>
        // ===== 1) Gullar bo'roni (intro) =====
        const vortex = document.getElementById('vortex');
        const totalIntroPetals = 1500;
        for (let i = 0; i < totalIntroPetals; i++) {
            const petal = document.createElement('div');
            petal.className = 'intro-petal';
            const rot = Math.random() * 360;
            const radStart = (50 + Math.random() * 45) + 'vw';
            const radEnd = (100 + Math.random() * 450) + 'px';
            const dur = (1.5 + Math.random() * 1.2).toFixed(2) + 's';
            const del = (Math.random() * 2.2).toFixed(2) + 's';
            const size = Math.floor(6 + Math.random() * 10);
            const sc = (0.7 + Math.random() * 0.6).toFixed(1);

            petal.style.setProperty('--rot', rot + 'deg');
            petal.style.setProperty('--rad-start', radStart);
            petal.style.setProperty('--rad-end', radEnd);
            petal.style.setProperty('--dur', dur);
            petal.style.setProperty('--del', del);
            petal.style.setProperty('--sc', sc);
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            vortex.appendChild(petal);
        }

        // ===== 2) Yulduzlar (orqa fon) =====
        const starsLayer = document.getElementById('stars-layer');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + "s");
            star.style.animationDelay = Math.random() * 5 + "s";
            starsLayer.appendChild(star);
        }

        // ===== 3) Kalligrafik matnni harf-barharf yozish (ikki guruhga bo'lib) =====
        // Chap guruh header'dagi chap belgiga, o'ng guruh o'ng belgiga mos keladi —
        // shu bilan yozuv keyinchalik AYNAN o'sha joyga "qo'nadi".
        const leftPhrase  = "✦Yaratgan Robbing";
        const rightPhrase = "nomi bilan o'qi ✦";

        const flyLeft  = document.getElementById('fly-left');
        const flyRight = document.getElementById('fly-right');

        const letterStartDelay = 4.6;   // soniya — intro/kalligrafiya crossfade tugagach boshlanadi
        const letterStagger    = 0.045; // har bir harf orasidagi farq
        const letterAnimDur    = 0.5;   // callyLetter animatsiyasi davomiyligi (CSS bilan mos)

        let charIndex = 0;
        function typeInto(container, phrase) {
            [...phrase].forEach((ch) => {
                const span = document.createElement('span');
                span.className = 'cally-letter';
                span.textContent = ch === ' ' ? '\u00A0' : ch;
                const delay = (letterStartDelay + charIndex * letterStagger).toFixed(3);
                const shimmerOffset = (Math.random() * 1.2).toFixed(2);
                span.style.animationDelay = delay + 's, ' + shimmerOffset + 's';
                container.appendChild(span);
                charIndex++;
            });
        }
        typeInto(flyLeft, leftPhrase);
        typeInto(flyRight, rightPhrase);

        const totalChars = charIndex;
        const typingFinishSec = letterStartDelay + totalChars * letterStagger + letterAnimDur;

        // ===== 4) Yozuv header joyiga "uchib borishi" (FLIP animatsiyasi) =====
        const pauseBeforeFlySec = 2; // yozuv to'liq yozilgach 2 soniya turadi
        const flyDurationMs     = 900; // uchish davomiyligi
        const fadeOutMs         = 700; // qorong'ulikning ochilishi

        function flyToTarget(source, target, durationMs) {
            const s = source.getBoundingClientRect();
            const t = target.getBoundingClientRect();

            // Shrift o'lchami nisbatiga asoslangan bir xil masshtab (matn cho'zilib ketmasligi uchun)
            const scale = t.height / s.height;

            // Ikkala elementning markazlarini bir-biriga moslashtiramiz
            const sCenterX = s.left + s.width / 2;
            const sCenterY = s.top + s.height / 2;
            const tCenterX = t.left + t.width / 2;
            const tCenterY = t.top + t.height / 2;

            const dx = tCenterX - sCenterX;
            const dy = tCenterY - sCenterY;

            source.style.transformOrigin = 'center center';
            source.style.transition = `transform ${durationMs}ms cubic-bezier(0.65,0,0.35,1)`;
            // reflow'ni majburlash
            void source.offsetWidth;
            source.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
        }

        function createTravelSparkle(nearEl, side) {
            // Yozuv markazda turganda, uning chap yoki o'ng chetida paydo bo'ladigan yulduzcha
            const rect = nearEl.getBoundingClientRect();
            const star = document.createElement('span');
            star.className = 'travel-sparkle';
            const offset = 14;
            const x = side === 'left' ? rect.left - offset : rect.right + offset;
            const y = rect.top + rect.height / 2 - 2.5;
            star.style.left = x + 'px';
            star.style.top = y + 'px';
            document.body.appendChild(star);
            return star;
        }

        function flySparkleTo(star, targetEl, durationMs) {
            const s = star.getBoundingClientRect();
            const t = targetEl.getBoundingClientRect();
            const dx = (t.left + t.width / 2) - (s.left + s.width / 2);
            const dy = (t.top + t.height / 2) - (s.top + s.height / 2);
            star.style.transition = `transform ${durationMs}ms cubic-bezier(0.65,0,0.35,1)`;
            void star.offsetWidth;
            star.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        function runFlySequence() {
            const targetLeft  = document.getElementById('cally-left');
            const targetRight = document.getElementById('cally-right');
            const screen      = document.getElementById('calligraphy-screen');

            // Markazdagi yozuvning ikki chetida 2 ta yulduzcha ko'rinadi
            const sparkleLeft  = createTravelSparkle(flyLeft, 'left');
            const sparkleRight = createTravelSparkle(flyRight, 'right');

            flyToTarget(flyLeft, targetLeft, flyDurationMs);
            flyToTarget(flyRight, targetRight, flyDurationMs);

            // Yulduzchalar ham xuddi matn kabi o'z joyiga uchib boradi
            requestAnimationFrame(() => {
                flySparkleTo(sparkleLeft, targetLeft, flyDurationMs);
                flySparkleTo(sparkleRight, targetRight, flyDurationMs);
            });

            setTimeout(() => {
                // Uchib borgan matn bilan header'dagi belgi bir xil joy/o'lchamda —
                // shuning uchun almashtirish sezilmaydi.
                flyLeft.style.visibility = 'hidden';
                flyRight.style.visibility = 'hidden';
                targetLeft.classList.add('landed');
                targetRight.classList.add('landed');

                // Yulduzchalar joyiga yetib borgach, o'sha yerda tinchgina yonib turadi
                sparkleLeft.style.left = '0px';
                sparkleLeft.style.top = '0px';
                sparkleLeft.style.transition = 'none';
                sparkleLeft.style.transform = 'none';
                const finalLeftRect = targetLeft.getBoundingClientRect();
                sparkleLeft.style.left = (finalLeftRect.left - 14) + 'px';
                sparkleLeft.style.top = (finalLeftRect.top + finalLeftRect.height / 2 - 2.5) + 'px';

                sparkleRight.style.left = '0px';
                sparkleRight.style.top = '0px';
                sparkleRight.style.transition = 'none';
                sparkleRight.style.transform = 'none';
                const finalRightRect = targetRight.getBoundingClientRect();
                sparkleRight.style.left = (finalRightRect.right + 14) + 'px';
                sparkleRight.style.top = (finalRightRect.top + finalRightRect.height / 2 - 2.5) + 'px';

                // Qorong'ulik ochilib, sahifa to'liq ko'rinadi
                screen.classList.add('hide');
                setTimeout(() => {
                    screen.style.display = 'none';
                }, fadeOutMs);
            }, flyDurationMs);
        }

        setTimeout(runFlySequence, (typingFinishSec + pauseBeforeFlySec) * 1000);

        // ===== 5) Header belgilari atrofidagi porillovchi yulduzchalar =====
        function addSparkles(el, count) {
            for (let i = 0; i < count; i++) {
                const star = document.createElement('span');
                star.className = 'sparkle-star';
                star.style.top = Math.random() * 80 + '%';
                star.style.left = Math.random() * 80 + '%';
                star.style.animationDuration = (0.8 + Math.random() * 1.4) + 's';
                star.style.animationDelay = (Math.random() * 1.5) + 's';
                el.appendChild(star);
            }
        }
    </script>
</body>
</html>
